name : App Testing 

on: 
    push:
        branches:
            - main

jobs: 
    test:
       runs-on: ubuntu-latest
       steps:
        - name: checkout code
          uses: actions/checkout@v4

        - name: setup node
          uses: actions/setup-node@v4  

        - name: stert server
          env: 
            MONGOOBD_CONACTION: ${{ secrets.MONGOOBD_CONACTION }} 
            RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          run: |
            cd backend
            npm install
            npm start & 
            sleep 5
            echo "Server started successfully"
            
        - name: start frontend
          run: |
            cd frontend
            npm install
            npm run dev &
            sleep 5
            echo "App running successfully"
 